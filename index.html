<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KEEP. — Trading Cards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --black: #0a0a0a;
    --white: #f8f8f8;
    --gray: #888;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--white);
    color: var(--black);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .announcement {
    background: var(--black);
    color: var(--white);
    text-align: center;
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  header {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 50px 20px 10px;
  }

  .logo {
    font-family: 'Inter', sans-serif;
    font-weight: 800;
    font-size: clamp(64px, 12vw, 120px);
    letter-spacing: -2px;
    line-height: 1;
    color: var(--black);
    text-transform: uppercase;
  }

  .hero {
    text-align: center;
    padding: 40px 20px 50px;
  }

  .hero-sub {
    font-size: clamp(12px, 2vw, 15px);
    font-weight: 400;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gray);
    margin-bottom: 35px;
  }

  .hero-title {
    font-family: 'Inter', sans-serif;
    font-weight: 800;
    font-size: clamp(16px, 3vw, 24px);
    line-height: 1.5;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--black);
    margin-bottom: 40px;
    max-width: 700px;
    margin-left: auto;
    margin-right: auto;
  }

  .shop-link {
    display: inline-block;
    font-family: 'Inter', sans-serif;
    font-weight: 800;
    font-size: clamp(14px, 2.5vw, 18px);
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--black);
    text-decoration: none;
    border: 2px solid var(--black);
    padding: 16px 50px;
    transition: all 0.4s;
  }

  .shop-link:hover {
    background: var(--black);
    color: var(--white);
  }

  /* ── CAROUSEL ── */
  .carousel-section {
    padding: 60px 0 20px;
    overflow: hidden;
    position: relative;
    border-top: 1px solid #e0e0e0;
  }

  .carousel-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gray);
    text-align: center;
    margin-bottom: 30px;
  }

  .carousel-section::before,
  .carousel-section::after {
    content: '';
    position: absolute;
    top: 0;
    bottom: 0;
    width: 60px;
    z-index: 2;
    pointer-events: none;
  }

  .carousel-section::before {
    left: 0;
    background: linear-gradient(to right, var(--white), transparent);
  }

  .carousel-section::after {
    right: 0;
    background: linear-gradient(to left, var(--white), transparent);
  }

  .carousel-track {
    display: flex;
    gap: 20px;
    width: max-content;
    animation: scroll var(--scroll-duration, 60s) linear infinite;
  }

  .carousel-track:hover {
    animation-play-state: paused;
  }

  @keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  .card {
    flex-shrink: 0;
    width: 180px;
    text-decoration: none;
    color: var(--black);
    transition: transform 0.35s cubic-bezier(0.25, 0.8, 0.25, 1);
    cursor: pointer;
  }

  .card:hover {
    transform: translateY(-8px) scale(1.03);
  }

  .card-img {
    width: 180px;
    height: 252px;
    object-fit: cover;
    border-radius: 10px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    transition: box-shadow 0.35s;
    background: #ececec;
  }

  .card:hover .card-img {
    box-shadow: 0 12px 36px rgba(0,0,0,0.18);
  }

  .card-name {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    margin-top: 10px;
    line-height: 1.3;
    padding: 0 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-price {
    font-size: 12px;
    font-weight: 800;
    margin-top: 4px;
  }

  .card-game {
    font-size: 9px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--gray);
    margin-top: 3px;
  }

  /* ── CTA ── */
  .cta {
    text-align: center;
    padding: 40px 20px 60px;
  }

  .cta-text {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gray);
    margin-bottom: 20px;
  }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 40px 20px 30px;
    border-top: 1px solid #e0e0e0;
  }

  .footer-logo {
    font-family: 'Inter', sans-serif;
    font-weight: 800;
    font-size: 28px;
    letter-spacing: -1px;
    margin-bottom: 12px;
  }

  .footer-text {
    font-size: 12px;
    color: var(--gray);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ── ANIMATIONS ── */
  .fade-in {
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 0.8s ease forwards;
  }

  .fade-in-1 { animation-delay: 0.1s; }
  .fade-in-2 { animation-delay: 0.25s; }
  .fade-in-3 { animation-delay: 0.4s; }
  .fade-in-4 { animation-delay: 0.55s; }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    .card { width: 150px; }
    .card-img { width: 150px; height: 210px; }
  }
</style>
</head>

  // Shuffle array
  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  const track = document.getElementById('carouselTrack');
  const shuffled = shuffle([...PRODUCTS]);

  // Build two copies for seamless loop
  const allCards = [...shuffled, ...shuffled];

  // Set scroll speed based on number of cards
  const cardWidth = 200; // card + gap
  const totalWidth = shuffled.length * cardWidth;
  const speed = 40; // pixels per second
  const duration = totalWidth / speed;
  track.style.setProperty('--scroll-duration', duration + 's');

  const ebayStore = 'https://www.ebay.com.au/usr/keep.tcg';

  allCards.forEach(product => {

    card.href = ebayStore;
    card.target = '_blank';

    const img = document.createElement('img');

    img.alt = product.name;
    img.loading = 'lazy';
    img.src = product.img;

    const name = document.createElement('div');
    name.className = 'card-name';
    name.textContent = product.name;

    const price = document.createElement('div');
    price.className = 'card-price';
    price.textContent = product.price;

    game.className = 'card-game';
    game.textContent = product.game;

    card.appendChild(img);
    card.appendChild(name);
    card.appendChild(price);
    card.appendChild(game);
    track.appendChild(card);
  });
