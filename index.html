<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KEEP. — Trading Cards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --black: #0a0a0a; --white: #f8f8f8; --gray: #888; }
  html { scroll-behavior: smooth; }
  body { font-family: 'Inter', sans-serif; background: var(--white); color: var(--black); overflow-x: hidden; -webkit-font-smoothing: antialiased; }

  /* ── BANNER ── */
  .announcement {
    background: var(--black); color: var(--white); text-align: center;
    padding: 10px 20px; font-size: 12px; font-weight: 400;
    letter-spacing: 1.2px; text-transform: uppercase;
  }
  .announcement a { color: var(--white); text-decoration: underline; text-underline-offset: 2px; transition: opacity 0.3s; }
  .announcement a:hover { opacity: 0.6; }
  .announcement .sep { margin: 0 8px; opacity: 0.4; }

  /* ── HEADER ── */
  header { display: flex; justify-content: center; align-items: center; padding: 40px 20px 10px; }
  .logo-img { max-width: clamp(200px, 40vw, 400px); height: auto; }

  /* ── HERO ── */
  .hero { text-align: center; padding: 30px 20px 50px; }
  .hero-sub { font-size: clamp(12px, 2vw, 15px); font-weight: 400; letter-spacing: 3px; text-transform: uppercase; color: var(--gray); margin-bottom: 35px; }
  .hero-title { font-family: 'Inter', sans-serif; font-weight: 800; font-size: clamp(16px, 3vw, 24px); line-height: 1.5; letter-spacing: 2px; text-transform: uppercase; color: var(--black); margin-bottom: 40px; max-width: 700px; margin-left: auto; margin-right: auto; }
  .shop-link { display: inline-block; font-family: 'Inter', sans-serif; font-weight: 800; font-size: clamp(14px, 2.5vw, 18px); letter-spacing: 2px; text-transform: uppercase; color: var(--black); text-decoration: none; border: 2px solid var(--black); padding: 16px 50px; transition: all 0.4s; }
  .shop-link:hover { background: var(--black); color: var(--white); }

  /* ── CAROUSEL SECTION ── */
  .carousel-section { padding: 60px 0 20px; overflow: hidden; position: relative; border-top: 1px solid #e0e0e0; }
  .carousel-label { font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--gray); text-align: center; margin-bottom: 24px; }

  .carousel-section::before, .carousel-section::after { content: ''; position: absolute; top: 0; bottom: 0; width: 60px; z-index: 2; pointer-events: none; }
  .carousel-section::before { left: 0; background: linear-gradient(to right, var(--white), transparent); }
  .carousel-section::after { right: 0; background: linear-gradient(to left, var(--white), transparent); }

  .carousel-track {
    display: flex; gap: 20px; width: max-content;
    cursor: grab; user-select: none; -webkit-user-select: none;
    margin-bottom: 20px;
  }
  .carousel-track.dragging { cursor: grabbing; }

  .card { flex-shrink: 0; width: 160px; text-decoration: none; color: var(--black); transition: transform 0.35s cubic-bezier(0.25, 0.8, 0.25, 1); cursor: pointer; }
  .card:hover { transform: translateY(-8px) scale(1.03); }
  .card-img { width: 160px; height: 224px; object-fit: cover; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); transition: box-shadow 0.35s; background: #ececec; pointer-events: none; }
  .card:hover .card-img { box-shadow: 0 12px 36px rgba(0,0,0,0.18); }
  .card-name { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; margin-top: 8px; line-height: 1.3; padding: 0 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; pointer-events: none; }
  .card-price { font-size: 11px; font-weight: 800; margin-top: 3px; pointer-events: none; }
  .card-game { font-size: 8px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; color: var(--gray); margin-top: 2px; pointer-events: none; }

  /* ── CTA ── */
  .cta { text-align: center; padding: 40px 20px 60px; }
  .cta-text { font-size: 12px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: var(--gray); margin-bottom: 20px; }

  /* ── FOOTER ── */
  footer { text-align: center; padding: 40px 20px 30px; border-top: 1px solid #e0e0e0; }
  .footer-logo { max-width: 120px; height: auto; margin-bottom: 12px; }
  .footer-text { font-size: 12px; color: var(--gray); letter-spacing: 1px; text-transform: uppercase; }

  .fade-in { opacity: 0; transform: translateY(20px); animation: fadeUp 0.8s ease forwards; }
  .fade-in-1 { animation-delay: 0.1s; } .fade-in-2 { animation-delay: 0.25s; } .fade-in-3 { animation-delay: 0.4s; } .fade-in-4 { animation-delay: 0.55s; }
  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 600px) {
    .card { width: 130px; }
    .card-img { width: 130px; height: 182px; }
    .announcement { font-size: 10px; letter-spacing: 0.8px; }
  }
</style>
</head>
<body>

  <div class="announcement">
    WE ARE BUYING STUFF YOU DO NOT WANT TO KEEP.
    <span class="sep">|</span>
    <a href="mailto:keeptcg.store@gmail.com">EMAIL US</a>
    <span class="sep">|</span>
    <a href="https://www.instagram.com/keep.tcg/?hl=en" target="_blank">INSTAGRAM</a>
  </div>

  <header>
    <img src="LOGO1.png" alt="KEEP." class="logo-img fade-in fade-in-1">
  </header>

  <section class="hero">
    <p class="hero-sub fade-in fade-in-2">SOMETHING TO KEEP.</p>
    <h1 class="hero-title fade-in fade-in-3">ONE PIECE TCG. POKEMON TCG. MAGIC THE GATHERING. AND MORE.</h1>
    <a class="shop-link fade-in fade-in-4" href="https://www.ebay.com.au/usr/keep.tcg" target="_blank">SHOP ON EBAY →</a>
  </section>

  <section class="carousel-section">
    <p class="carousel-label">FIND THESE AND MORE ON OUR EBAY STORE</p>
    <div class="carousel-track" id="track1"></div>
    <div class="carousel-track" id="track2"></div>
  </section>

  <section class="cta">
    <p class="cta-text" id="ctaCount">CARDS AVAILABLE NOW</p>
    <a class="shop-link" href="https://www.ebay.com.au/usr/keep.tcg" target="_blank">BROWSE ALL ON EBAY →</a>
  </section>

  <footer>
    <img src="LOGO1.png" alt="KEEP." class="footer-logo">
    <p class="footer-text">© 2026 KEEP. ALL RIGHTS RESERVED.</p>
  </footer>

  <script src="products.js"></script>
  <script>
    // ── SHUFFLE ──
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // ── SPLIT PRODUCTS INTO TWO ROWS ──
    const shuffled = shuffle(PRODUCTS);
    const half = Math.ceil(shuffled.length / 2);
    const row1Data = shuffled.slice(0, half);
    const row2Data = shuffled.slice(half);

    document.getElementById('ctaCount').textContent = PRODUCTS.length + ' CARDS AVAILABLE NOW';

    // ── BUILD A CAROUSEL ROW ──
    function buildRow(trackEl, data, direction) {
      // Double up for seamless loop
      const cards = [...data, ...data];

      cards.forEach(product => {
        const card = document.createElement('a');
        card.className = 'card';
        card.href = product.url || 'https://www.ebay.com.au/usr/keep.tcg';
        card.target = '_blank';

        const img = document.createElement('img');
        img.className = 'card-img';
        img.alt = product.name;
        img.loading = 'lazy';
        img.src = product.img;

        const name = document.createElement('div');
        name.className = 'card-name';
        name.textContent = product.name;

        const price = document.createElement('div');
        price.className = 'card-price';
        price.textContent = product.price;

        const game = document.createElement('div');
        game.className = 'card-game';
        game.textContent = product.game;

        card.appendChild(img);
        card.appendChild(name);
        card.appendChild(price);
        card.appendChild(game);
        trackEl.appendChild(card);
      });

      // ── AUTO SCROLL ──
      const cardW = 180; // card width + gap
      const totalW = data.length * cardW;
      const speed = direction === 'left' ? 35 : 30; // slightly different speeds
      const dur = totalW / speed;

      // Use CSS animation
      const animName = direction === 'left' ? 'scrollLeft' : 'scrollRight';
      const keyframes = direction === 'left'
        ? `@keyframes ${animName} { 0% { transform: translateX(0); } 100% { transform: translateX(-${totalW}px); } }`
        : `@keyframes ${animName} { 0% { transform: translateX(-${totalW}px); } 100% { transform: translateX(0); } }`;

      const style = document.createElement('style');
      style.textContent = keyframes;
      document.head.appendChild(style);

      trackEl.style.animation = `${animName} ${dur}s linear infinite`;

      // ── DRAG TO SCRUB ──
      let isDragging = false;
      let startX = 0;
      let scrollStart = 0;
      let currentOffset = 0;
      let dragDistance = 0;
      let animStopped = false;

      function getCurrentX() {
        const m = new DOMMatrix(getComputedStyle(trackEl).transform);
        return m.m41;
      }

      function stopAnim() {
        if (!animStopped) {
          currentOffset = getCurrentX();
          trackEl.style.animation = 'none';
          trackEl.style.transform = `translateX(${currentOffset}px)`;
          animStopped = true;
        }
      }

      function resumeAnim() {
        currentOffset = currentOffset % totalW;
        if (direction === 'left') {
          if (currentOffset > 0) currentOffset -= totalW;
          const progress = Math.abs(currentOffset) / totalW;
          trackEl.style.transform = '';
          trackEl.style.animation = `${animName} ${dur}s linear infinite`;
          trackEl.style.animationDelay = `-${progress * dur}s`;
        } else {
          if (currentOffset < -totalW) currentOffset += totalW;
          if (currentOffset > 0) currentOffset -= totalW;
          const progress = (totalW + currentOffset) / totalW;
          trackEl.style.transform = '';
          trackEl.style.animation = `${animName} ${dur}s linear infinite`;
          trackEl.style.animationDelay = `-${progress * dur}s`;
        }
        animStopped = false;
      }

      // Mouse
      trackEl.addEventListener('mousedown', e => {
        isDragging = true; dragDistance = 0; startX = e.clientX;
        stopAnim(); scrollStart = currentOffset;
        trackEl.classList.add('dragging'); e.preventDefault();
      });
      window.addEventListener('mousemove', e => {
        if (!isDragging) return;
        const dx = e.clientX - startX; dragDistance = Math.abs(dx);
        currentOffset = scrollStart + dx;
        if (currentOffset > 0) currentOffset -= totalW;
        if (currentOffset < -totalW) currentOffset += totalW;
        trackEl.style.transform = `translateX(${currentOffset}px)`;
      });
      window.addEventListener('mouseup', () => {
        if (!isDragging) return;
        isDragging = false; trackEl.classList.remove('dragging');
        resumeAnim();
      });
      trackEl.addEventListener('click', e => { if (dragDistance > 5) { e.preventDefault(); e.stopPropagation(); } }, true);

      // Touch
      let touchStartX = 0;
      trackEl.addEventListener('touchstart', e => {
        isDragging = true; dragDistance = 0; touchStartX = e.touches[0].clientX;
        stopAnim(); scrollStart = currentOffset; trackEl.classList.add('dragging');
      }, { passive: true });
      trackEl.addEventListener('touchmove', e => {
        if (!isDragging) return;
        const dx = e.touches[0].clientX - touchStartX; dragDistance = Math.abs(dx);
        currentOffset = scrollStart + dx;
        if (currentOffset > 0) currentOffset -= totalW;
        if (currentOffset < -totalW) currentOffset += totalW;
        trackEl.style.transform = `translateX(${currentOffset}px)`;
      }, { passive: true });
      trackEl.addEventListener('touchend', () => {
        if (!isDragging) return;
        isDragging = false; trackEl.classList.remove('dragging');
        resumeAnim();
      });

      // Pause on hover (non-drag)
      trackEl.addEventListener('mouseenter', () => { if (!isDragging) stopAnim(); });
      trackEl.addEventListener('mouseleave', () => { if (!isDragging) resumeAnim(); });
    }

    // Build both rows — opposite directions for visual interest
    buildRow(document.getElementById('track1'), row1Data, 'left');
    buildRow(document.getElementById('track2'), row2Data, 'right');
  </script>
</body>
</html>
